<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WindowPanes Gemstone workspace preview</title>
  <desc id="desc">A stylized preview of the WindowPanes desktop app with overlapping terminal panes for AI coding CLIs.</desc>
  <defs>
    <linearGradient id="stage" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10151D"/>
      <stop offset="0.46" stop-color="#17222B"/>
      <stop offset="1" stop-color="#1D1324"/>
    </linearGradient>
    <linearGradient id="panelDiamond" x1="116" y1="126" x2="625" y2="526" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3FAFF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#9BB8C7" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="panelAmethyst" x1="742" y1="112" x2="1307" y2="529" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8BCFF" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#5D3D7D" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="panelOnyx" x1="393" y1="449" x2="1106" y2="799" gradientUnits="userSpaceOnUse">
      <stop stop-color="#313946" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#090B0F" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#020407" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1440" height="900" rx="34" fill="url(#stage)"/>
  <path d="M0 658C222 582 343 742 536 674C722 608 800 447 1021 496C1184 532 1283 642 1440 575V900H0V658Z" fill="#152F38" opacity="0.34"/>
  <path d="M154 159C348 93 529 97 699 148C879 202 1030 192 1242 128" stroke="#75D4EE" stroke-opacity="0.18" stroke-width="2"/>
  <path d="M180 752C421 642 560 820 802 682C996 571 1151 634 1322 550" stroke="#E5B5FF" stroke-opacity="0.14" stroke-width="2"/>

  <path d="M88 716L280 594L458 648L641 526L817 589L986 487L1180 541L1352 439" stroke="#8CE9C5" stroke-opacity="0.12" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M130 250L338 200L520 267L710 180L914 244L1120 171L1306 228" stroke="#F2D8FF" stroke-opacity="0.1" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="92" y="110" width="560" height="424" rx="18" fill="url(#panelDiamond)" stroke="#F4FBFF" stroke-opacity="0.76" stroke-width="2"/>
    <path d="M92 183H652" stroke="#F4FBFF" stroke-opacity="0.38"/>
    <circle cx="132" cy="146" r="9" fill="#FF6D69"/>
    <circle cx="161" cy="146" r="9" fill="#F4C95D"/>
    <circle cx="190" cy="146" r="9" fill="#63D38C"/>
    <text x="222" y="153" fill="#13212A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700">Generic Shell</text>
    <text x="126" y="229" fill="#13212A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">$ git status --short</text>
    <text x="126" y="270" fill="#224250" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">## main...origin/main</text>
    <text x="126" y="311" fill="#224250" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">$ npm test</text>
    <text x="126" y="352" fill="#236646" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">149 tests passed</text>
    <rect x="126" y="389" width="314" height="12" rx="6" fill="#32596A" opacity="0.36"/>
    <rect x="126" y="421" width="405" height="12" rx="6" fill="#32596A" opacity="0.26"/>
    <rect x="126" y="453" width="236" height="12" rx="6" fill="#32596A" opacity="0.3"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="719" y="96" width="600" height="452" rx="18" fill="url(#panelAmethyst)" stroke="#EBD9FF" stroke-opacity="0.66" stroke-width="2"/>
    <path d="M719 170H1319" stroke="#EBD9FF" stroke-opacity="0.32"/>
    <text x="754" y="142" fill="#FCF8FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700">Droid</text>
    <rect x="1143" y="120" width="126" height="32" rx="16" fill="#211530" fill-opacity="0.42"/>
    <text x="1172" y="142" fill="#F9ECFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">running</text>
    <text x="754" y="218" fill="#FEF9FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">Planning patch...</text>
    <text x="754" y="259" fill="#F4DBFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">- inspect renderer state</text>
    <text x="754" y="300" fill="#F4DBFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">- preserve provider boundaries</text>
    <text x="754" y="341" fill="#F4DBFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">- ship cross-platform build</text>
    <rect x="754" y="386" width="472" height="14" rx="7" fill="#F5D8FF" opacity="0.25"/>
    <rect x="754" y="424" width="380" height="14" rx="7" fill="#F5D8FF" opacity="0.2"/>
    <rect x="754" y="462" width="504" height="14" rx="7" fill="#F5D8FF" opacity="0.18"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="355" y="419" width="740" height="362" rx="20" fill="url(#panelOnyx)" stroke="#8CE9C5" stroke-opacity="0.48" stroke-width="2"/>
    <path d="M355 493H1095" stroke="#8CE9C5" stroke-opacity="0.2"/>
    <text x="396" y="466" fill="#EBFFF8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="23" font-weight="700">Codex CLI</text>
    <rect x="890" y="440" width="142" height="34" rx="17" fill="#C0FFE9" fill-opacity="0.12"/>
    <text x="923" y="463" fill="#C7FFE9" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">assigned</text>
    <text x="396" y="548" fill="#E5FFF7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">WindowPanes keeps each agent in its own local terminal.</text>
    <text x="396" y="592" fill="#BAFFE6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">No hidden prompts. No provider proxy. No transcript logging.</text>
    <text x="396" y="636" fill="#8CE9C5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">Launch, arrange, resize, save, and come back later.</text>
    <rect x="396" y="683" width="222" height="14" rx="7" fill="#8CE9C5" opacity="0.3"/>
    <rect x="644" y="683" width="336" height="14" rx="7" fill="#8CE9C5" opacity="0.18"/>
    <rect x="396" y="724" width="431" height="14" rx="7" fill="#8CE9C5" opacity="0.2"/>
  </g>

  <g>
    <rect x="82" y="808" width="1276" height="54" rx="27" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="118" y="843" fill="#F6FBFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700">Claude Code</text>
    <text x="284" y="843" fill="#F6FBFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700">Codex CLI</text>
    <text x="439" y="843" fill="#F6FBFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700">Droid</text>
    <text x="541" y="843" fill="#F6FBFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700">OpenCode</text>
    <text x="692" y="843" fill="#F6FBFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700">Reasonix</text>
    <text x="845" y="843" fill="#F6FBFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700">Pi</text>
    <text x="900" y="843" fill="#F6FBFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700">Hermes</text>
    <text x="1021" y="843" fill="#F6FBFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700">OpenClaw</text>
    <text x="1175" y="843" fill="#B8C7D1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18">+ any shell command</text>
  </g>
</svg>
