name: Release

on:
  push:
    tags:
      - windowpanes-v*

permissions:
  contents: write

jobs:
  mac:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build macOS DMG
        run: npm run dist:mac:gemstone -- --publish never

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: windowpanes-macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build Windows installer
        run: npm run dist:win -- --publish never

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windowpanes-windows-installer
          path: dist/WindowPanes-Setup-*.exe
          if-no-files-found: error

  linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 pkg-config libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libdrm2 libgbm1
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build Linux AppImage
        run: npm run dist:linux -- --publish never

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: windowpanes-linux-appimage
          path: dist/WindowPanes-*-x86_64.AppImage
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - mac
      - windows
      - linux

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-artifacts/* --clobber
          else
            gh release create "$TAG_NAME" release-artifacts/* --title "$TAG_NAME" --notes "Automated WindowPanes release for $TAG_NAME."
          fi
